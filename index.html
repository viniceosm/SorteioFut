<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Times Sorteados</title>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f7b0f, #063b06);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #res {
            width: 900px;
            max-width: 100%;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        }

        .titulo {
            text-align: center;
            margin-bottom: 25px;
        }

        .titulo h1 {
            margin: 0;
            color: #145c14;
            font-size: 36px;
        }

        .titulo p {
            margin-top: 8px;
            color: #777;
            font-size: 18px;
        }

        .times {
            display: flex;
            gap: 20px;
        }

        .card-time {
            flex: 1;
            background: #f6f8f6;
            border-radius: 15px;
            padding: 18px;
            border: 1px solid #e5e5e5;
        }

        .card-time h2,
        .card-reservas h2 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .jogador {
            background: white;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 22px;
            border-left: 6px solid #198f19;
        }

        .card-reservas {
            margin-top: 20px;
            background: #fff9eb;
            border-radius: 15px;
            padding: 18px;
            border: 1px solid #f3d27c;
        }

        #reservas {
            font-size: 24px;
            line-height: 1.6;
        }

        button {
            margin-top: 20px;
            width: 900px;
            max-width: 100%;
            border: none;
            border-radius: 12px;
            padding: 15px;
            background: #16a016;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        }

        button:hover {
            background: #128512;
        }

        @media (max-width: 768px) {
            .times {
                gap: 10px;
            }

            .titulo h1 {
                font-size: 28px;
            }

            .titulo p {
                font-size: 14px;
            }

            .card-time h2,
            .card-reservas h2 {
                font-size: 20px;
            }

            .jogador {
                font-size: 16px;
                padding: 10px;
            }

            #reservas {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

    <div id="res">
        <div class="titulo">
            <h1>⚽ Times Sorteados</h1>
            <p>Resultado do sorteio da pelada</p>
        </div>

        <div class="times">
            <div class="card-time">
                <h2>🟢 Time 1</h2>
                <div id="time1"></div>
            </div>

            <div class="card-time">
                <h2>⚫ Time 2</h2>
                <div id="time2"></div>
            </div>
        </div>

        <div class="card-reservas">
            <h2>🟡 Reservas</h2>
            <div id="reservas"></div>
        </div>
    </div>

    <button onclick="compartilharResultado()">
        Compartilhar resultado
    </button>

</body>
</html>

<script>
    var jogadores = [
        { nome: 'Dalton' },
        { nome: 'Gadotti' },
        { nome: 'Oli' },
        { nome: 'Christopher' },
        { nome: 'Evandro' },
        { nome: 'Johny' },
        { nome: 'Lucas Braun' },
        { nome: 'Matheus Quadros' },
        { nome: 'Fabio' },
        { nome: 'Jonatha' },
        { nome: 'Marcelo' },
        { nome: 'Rafael' },
        { nome: 'Thiago' },
        { nome: 'Johnatan Bastos' },
        { nome: '9158-4693' }
    ];

    var jogadoresNaoVao = [];

    var qtdJogadorCadaTime = 6;

    var [time1, time2, reservas] = sortear(
        jogadores,
        jogadoresNaoVao,
        qtdJogadorCadaTime
    );

    preencherTime('time1', time1);
    preencherTime('time2', time2);

    document.getElementById('reservas').innerHTML =
        reservas.length
            ? reservas.join(' • ')
            : 'Sem reservas';

    function preencherTime(id, jogadores) {
        document.getElementById(id).innerHTML =
            jogadores
                .map(nome => `<div class="jogador">${nome}</div>`)
                .join('');
    }

    function sortear(jogadores, jogadoresNaoVao, qtdJogadorCadaTime) {

        var jogadoresDisponiveis = jogadores.filter(
            jogador => !jogadoresNaoVao.includes(jogador.nome)
        );

        jogadoresDisponiveis.sort(() => Math.random() - 0.5);

        var time1 = jogadoresDisponiveis
            .slice(0, qtdJogadorCadaTime)
            .map(j => j.nome);

        var time2 = jogadoresDisponiveis
            .slice(qtdJogadorCadaTime, qtdJogadorCadaTime * 2)
            .map(j => j.nome);

        var reservas = jogadoresDisponiveis
            .slice(qtdJogadorCadaTime * 2)
            .map(j => j.nome);

        return [time1, time2, reservas];
    }

    function compartilharResultado() {

        html2canvas(document.getElementById('res'), {
            scale: 2,
            backgroundColor: '#ffffff'
        }).then(function(canvas) {

            canvas.toBlob(async (blob) => {

                const files = [
                    new File(
                        [blob],
                        'times-sorteados.png',
                        {
                            type: 'image/png'
                        }
                    )
                ];

                const shareData = {
                    files
                };

                if (
                    navigator.canShare &&
                    navigator.canShare(shareData)
                ) {
                    try {
                        await navigator.share(shareData);
                    } catch (err) {
                        if (err.name !== 'AbortError') {
                            console.error(err);
                        }
                    }
                } else {
                    alert(
                        'Compartilhamento não suportado neste navegador.'
                    );
                }
            });
        });
    }
</script>
